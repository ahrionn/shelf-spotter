<div class="modal">
    <h1><i>Atenção!</i></h1>
    <p>Sua lista será organizada conforme a disposição de corredores do supermercado. Deseja continuar?</p>
    <div class="buttons">
        <button type="button" class="botao-sim" (click)="fecharModal(true)">
            <mat-icon>check</mat-icon>
        </button>
        <button type="button" (click)="fecharModal(false)">
            <mat-icon>close</mat-icon>
        </button>
    </div>
</div>
